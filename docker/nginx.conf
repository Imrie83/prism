# Compact log format — method, path, status, size, response time only
log_format compact '$request_method $request_uri → $status '
                   '${body_bytes_sent}b ${request_time}s';

# Only log non-200/304 static asset requests to keep noise down
map $status $loggable {
    ~^[23]  0;
    default 1;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    access_log /var/log/nginx/access.log compact;

    # Proxy all /api calls to the backend container
    location /api/ {
        proxy_pass         http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        # Important for streaming (ndjson keepalives)
        proxy_buffering    off;
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
        chunked_transfer_encoding on;

        # Always log API calls regardless of status
        access_log /var/log/nginx/access.log compact;
    }

    # SPA fallback — all non-file routes serve index.html
    # Only log failures for static files
    location / {
        try_files $uri $uri/ /index.html;
        access_log /var/log/nginx/access.log compact if=$loggable;
    }
}
